name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/ benchmarks/ examples/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports

      - name: Run tests (GPU tests auto-skip without CUDA)
        run: pytest tests/ -v --tb=short --cov=src/triton_kernels --cov-report=xml -m "not gpu"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  benchmark-smoke:
    name: "Benchmark smoke test"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,bench]"

      - name: Run benchmark (simulated mode)
        run: python benchmarks/bench_kernels.py

      - name: Run quickstart example
        run: python examples/quickstart.py
